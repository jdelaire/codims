<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codims</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/controls/OrbitControls.js": "./vendor/three/OrbitControls.js"
        }
      }
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-lockup">
        <h1>Codims</h1>
        <p id="statusText">Loading Codex rooms...</p>
      </div>
      <div class="counters" aria-label="Codims counters">
        <div class="counter">
          <span id="activeCount">0</span>
          <span class="counter-label">running now</span>
        </div>
        <div class="counter">
          <span id="visibleCount">0</span>
          <span class="counter-label">visible threads</span>
        </div>
        <div class="counter">
          <span id="projectCount">0</span>
          <span class="counter-label">projects</span>
        </div>
      </div>
      <form class="controls" id="controls">
        <label>
          Max age
          <input id="maxAgeHours" name="maxAgeHours" type="number" min="0" step="1" value="8">
          <span>h</span>
        </label>
        <label>
          Density
          <select id="densityMode" name="densityMode">
            <option value="normal">Normal</option>
            <option value="compact">Compact</option>
          </select>
        </label>
        <label class="search-control">
          Search
          <input id="threadSearch" name="threadSearch" type="search" placeholder="project, thread, agent">
        </label>
        <button id="liveToggle" type="button" aria-pressed="true">Live</button>
        <button id="labelsToggle" type="button" aria-pressed="true">Labels</button>
        <button id="privacyToggle" type="button" aria-pressed="false">Privacy</button>
        <button id="inactiveToggle" type="button" aria-pressed="false">Show idle</button>
      </form>
    </header>

    <main class="app-layout">
      <section class="scene-shell" aria-label="3D Codex worker rooms">
        <div id="scene"></div>
        <div id="labels" class="labels-layer"></div>
        <div id="emptyState" class="empty-state" hidden>No recent open subagent threads.</div>
      </section>

      <aside class="details-panel" aria-label="Thread details">
        <section class="review-lane" aria-labelledby="reviewLaneTitle">
          <div class="review-lane-header">
            <div>
              <h2 id="reviewLaneTitle">Action inbox</h2>
              <p id="reviewCount">0 unreviewed / 0 done</p>
            </div>
            <div class="review-lane-actions">
              <button id="reviewPanelToggle" type="button" aria-pressed="false">Expand</button>
              <button id="reviewStaleToggle" type="button" aria-pressed="true">Hide stale</button>
              <button id="reviewUnreviewedToggle" type="button" aria-pressed="false">Unreviewed only</button>
            </div>
          </div>
          <div class="action-inbox-filters" aria-label="Action inbox filters">
            <button type="button" data-action-inbox-filter="needs_review" aria-pressed="false">
              <span data-action-inbox-count="needs_review">0</span>
              <span>Needs review</span>
            </button>
            <button type="button" data-action-inbox-filter="running" aria-pressed="false">
              <span data-action-inbox-count="running">0</span>
              <span>Running</span>
            </button>
            <button type="button" data-action-inbox-filter="stale" aria-pressed="false">
              <span data-action-inbox-count="stale">0</span>
              <span>Stale</span>
            </button>
            <button type="button" data-action-inbox-filter="reviewed" aria-pressed="false">
              <span data-action-inbox-count="reviewed">0</span>
              <span>Reviewed</span>
            </button>
          </div>
          <div id="reviewList" class="review-list"></div>
        </section>
        <div id="detailsEmpty" class="details-empty">
          Click a worker to inspect its thread.
        </div>
        <div id="detailsContent" class="details-content" hidden>
          <div class="details-heading">
            <h2 id="detailNickname"></h2>
            <span id="detailState"></span>
          </div>
          <dl>
            <dt>Role</dt>
            <dd id="detailRole"></dd>
            <dt>Project</dt>
            <dd id="detailProject"></dd>
            <dt>Age</dt>
            <dd id="detailAge"></dd>
            <dt>Title / content</dt>
            <dd id="detailTitle" class="wrapped"></dd>
            <dt id="detailThreadContentLabel">Agent prompt + last response</dt>
            <dd id="detailThreadContent" class="wrapped thread-content"></dd>
            <dt>Parent thread</dt>
            <dd id="detailParent" class="wrapped"></dd>
            <dt>CWD</dt>
            <dd id="detailCwd" class="wrapped mono"></dd>
            <dt>Thread id</dt>
            <dd id="detailId" class="wrapped mono"></dd>
          </dl>
          <form id="threadMessageForm" class="thread-message" hidden>
            <label for="threadMessageInput">Send to main thread</label>
            <textarea
              id="threadMessageInput"
              rows="4"
              placeholder="Message this thread"
            ></textarea>
            <div class="thread-message-actions">
              <button id="threadMessagePreview" type="button">Preview</button>
              <button id="threadMessageSubmit" type="submit">Send</button>
              <span id="threadMessageStatus" role="status"></span>
            </div>
          </form>
          <dialog id="sendConfirmDialog" class="send-dialog">
            <form method="dialog">
              <h3>Send to thread?</h3>
              <p id="sendConfirmTarget"></p>
              <pre id="sendConfirmMessage"></pre>
              <menu>
                <button value="cancel">Cancel</button>
                <button id="sendConfirmSubmit" value="send">Send</button>
              </menu>
            </form>
          </dialog>
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
